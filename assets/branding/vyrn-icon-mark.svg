<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vyrnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7CFF00"/>
      <stop offset="100%" stop-color="#28B8FF"/>
    </linearGradient>
    <linearGradient id="vyrnRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7CFF00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#28B8FF" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#vyrnRingGrad)" stroke-width="6"/>

  <!-- Inner dark circle -->
  <circle cx="256" cy="256" r="228" fill="#0A0A0A"/>

  <!-- V-chevron — left arm (lime green) -->
